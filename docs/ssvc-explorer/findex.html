<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSVC Policy Explorer</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
	    integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
	    crossorigin="anonymous">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"
	    integrity="sha384-N8EP0Yml0jN7e0DcXlZ6rt+iqKU9Ck6f1ZQ+j2puxatnBq4k9E8Q6vqBcY34LNbn"
	    crossorigin="anonymous"></script>
    <script src="simple.js?v=2025081910"></script>
  </head>
  <body>
    <div>
      <div>
	<h1>SSVC Policy Explorer</h1>
	<form autocomplete="off">
	  <span>SSVC Sample Trees</span>
	  <input type="file" name="fileupload" style="display:none" onchange="readFile(this)">
	  <select onchange="loadSSVC(this.options[this.selectedIndex].value)" id="sampletrees"
		  style="font-size: 18px;background: white;border-radius: 13px;padding: 0px 4px 0px 4px;font-weight: bolder;" autocomplete="off">
	  </select>
	  <span> </span>
	  <button type="button" data-customize="1"
		  style="display: inline-block; background-color: #007bff; padding: 2px; color: white; border-radius: 4px;"
		  onclick="customize(this)">Customize</button>
	  &nbsp;
	  <button style="background-color: #dc3545; color: white;" type="button"
		  data-csv=""> CLEAR </button>
	  &nbsp;
	  <button type="button" data-toggleall="1"
		  style="display: inline-block; background-color: #007bff; padding: 2px; color: white; border-radius: 4px;"
		  onclick="toggleAll()">Toggle All</button>
	  <div style="padding: 8px 0px 0px 0px;position: relative; display:none" data-session="1">
	    SSVC Custom Trees
	    <select style="font-size: 18px;background: white;border-radius: 8px;padding: 0px 4px 0px 4px;" onchange="this.selectedIndex=0">
	      <option>Manage </option>
	      <option onclick="restore_session()">Restore Session</option>
	      <option onclick="delete_session()">Delete Old Sessions</option>
	      <option onclick="delete_dtree()">Delete Current Tree</option>
	      <option onclick="rename_dtree()">Rename Current Tree</option>
	      <option onclick="download_ssvc('json')">Download (JSON)</option>
	      <option onclick="download_ssvc('csv')">Download (CSV)</option>
	    </select>
	    <a style="display:none" data-download-json="1">Download (JSON)</a>
	    <a style="display:none" data-download-csv="1">Download (CSV)</a>
	  </div>
	  
	</form>
	<p>
	  <form id="ssvcForm" autocomplete="off">
	  </form>
	</p>
      </div>
      <div id="ssvcPopup" style="position: fixed; display:none;top: 50%; left: 50%;transform: translate(-50%, -50%); background-color: #fff; border: 4px solid #ccc; padding: 10px; border-radius: 6px; width: auto; max-height: 80%;overflow-y: auto;">
	<div data-customdp="1">
	  <h4 style="text-align: center">Customize Decision Point</h4>
	  <form onSubmit="return false();" style="text-align:left" autocomplete="off">
	    <div style="padding-bottom:10px">
	      <select style="background: transparent; border-radius: 6px; padding: 0px 4px 0px 4px;font-weight: bolder;">
		<option value="">Choose/Create Decision Point</option>
	      </select>
	    </div>
	    <div style="display: table-row">
	      <label style="display:table-cell">Name</label>
	      <input required type="text" style="min-width: 300px;display:table-cell" name="obj-name" placeholder="Name (Exploitation)">
	    </div>
	    <div  style="display:table-row">
	      <label style="display:table-cell">Namespace</label>
	      <input required type="text" style="min-width: 300px;display:table-cell" name="obj-namespace" placeholder="Namespace (ssvc)">
	    </div>
	    <div  style="display: table-row">
	      <label for="dpVersion" style="display:table-cell">Version</label>
	      <input required type="text" style="min-width: 300px;display:table-cell" name="obj-version" placeholder="Version (1.0.0)">
	    </div>
	    <div style="display: table-row">
	      <label style="display:table-cell">Description</label>
	      <textarea required style="display:table-cell; min-height: 30px; min-width: 300px;" name="obj-description" placeholder="Description" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	    <div style="display: table-row">
	      <label style="display: table-cell">Decision Point Values</label>
	      <button type="button" style="display:table-cell" onclick="dpValueClone(this)">(+) Add</button>
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell"> &nbsp; Value</label>
	      <input required type="text" name="obj-values-0-name" style="min-width: 300px;display: table-cell">
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell;"> &nbsp; Description</label>
	      <textarea required name="obj-values-0-description" style="display: table-cell; min-height: 30px; min-width: 300px;" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell"> &nbsp; Value</label>
	      <input required type="text" name="obj-values-1-name" style="min-width: 300px;display: table-cell">
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell;"> &nbsp; Description</label>
	      <textarea required name="obj-values-1-description" style="display: table-cell;min-height: 30px; min-width: 300px;" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	  </form>
	  <button onclick="updateTree()" data-update="1" style="margin-top: 10px;padding: 8px 12px;border: none;background-color: #007bff;color: #fff;border-radius: 4px;cursor: pointer; float:right">Update</button>
	  <button onclick="popupEnd()" style="margin: 10px 10px 0px 0px;;padding: 8px 12px;border: none;background-color: #ff2121;color: #fff;border-radius: 4px;cursor: pointer; float:right">Cancel</button>
	</div>
	<div data-customoutcome="1">
	  <h4 style="text-align: center">Customize Outcomes</h4>
	  <form onSubmit="return false();" style="text-align:left" autocomplete="off">
	    <div style="padding-bottom:10px">
	      <select style="background: transparent; border-radius: 6px; padding: 0px 4px 0px 4px;font-weight: bolder;">
		<option value="">Choose/Customize Outcomes</option>
	      </select>
	    </div>
	    <div style="display: table-row">
	      <label style="display:table-cell">Name</label>
	      <input required type="text" style="min-width: 300px;display:table-cell" name="obj-name" placeholder="Name (Defer)">
	    </div>
	    <div style="display: table-row">
	      <label style="display:table-cell">Description</label>
	      <textarea required style="display:table-cell; min-height: 30px; min-width: 300px;" name="obj-description" placeholder="Description" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	    <div style="display: table-row">
	      <label style="display: table-cell">Outcome Values</label>
	      <button type="button" style="display:table-cell" onclick="dpValueClone(this)">(+) Add</button>
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell"> &nbsp; Value</label>
	      <input required type="text" name="obj-outcomes-0-name" style="min-width: 300px;display: table-cell">
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell;"> &nbsp; Description</label>
	      <textarea required name="obj-outcomes-0-description" style="display: table-cell; min-height: 30px; min-width: 300px;" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell"> &nbsp; Value</label>
	      <input required type="text" name="obj-outcomes-1-name" style="min-width: 300px;display: table-cell">
	    </div>
	    <div style="display: table-row" data-clone="1">
	      <label style="border-left: 1px solid cyan; display: table-cell;"> &nbsp; Description</label>
	      <textarea required name="obj-outcomes-1-description" style="display: table-cell;min-height: 30px; min-width: 300px;" onchange="textAreaAutoSize(this)"></textarea>
	    </div>
	  </form>
	  <button onclick="updateOutcomes()" style="margin-top: 10px;padding: 8px 12px;border: none;background-color: #007bff;color: #fff;border-radius: 4px;cursor: pointer; float:right">Update</button>
	  <button onclick="popupEnd()" style="margin: 10px 10px 0px 0px;;padding: 8px 12px;border: none;background-color: #ff2121;color: #fff;border-radius: 4px;cursor: pointer; float:right">Cancel</button>
	</div>	
	<div data-yesno="1" style="display:none">
	  <h4 style="text-align: center">Would you like to proceed?</h4>
	  <button style="margin-top: 10px;padding: 8px 12px;border: none;background-color: #007bff;color: #fff;border-radius: 4px;cursor: pointer; float:right">Yes</button>
	  <button style="margin: 10px 10px 0px 0px;;padding: 8px 12px;border: none;background-color: #ff2121;color: #fff;border-radius: 4px;cursor: pointer; float:right">No</button>	  
	</div>
	
      </div>
    </div>
  </body>
</html>
