id: VR
title: Versioning Rules
description: >
  Requirements for how SSVC objects, schemas, and the overall project are
  versioned. SSVC uses a layered versioning strategy: individual domain
  objects (decision points, decision point groups, decision tables) use
  Semantic Versioning (SemVer 2.0.0); JSON schema files use SchemaVer; and
  the overall SSVC project uses Calendar Versioning (CalVer). These rules
  implement ADR-0002, ADR-0005, ADR-0006, ADR-0013, and ADR-0015.
version: "0.1.0"
kind: domain
scope: [production]

groups:
  - id: VR-01
    title: Decision Point SemVer Rules
    description: >
      Rules governing how Semantic Version numbers are incremented for
      individual DecisionPoint objects. Implements ADR-0006.
    specs:
      - id: VR-01-001
        priority: MUST
        statement: >
          VR-01-001 A new DecisionPoint object (with a new name and key)
          MUST be created when a different or fundamentally new concept is
          being represented, even if it superficially resembles an existing
          decision point.
        rationale: >
          Creating a new object for conceptually distinct decision points
          preserves the integrity of prior versions and prevents misleading
          backward-compatibility claims.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-01-002
        priority: MUST
        statement: >
          VR-01-002 The major version of a DecisionPoint MUST be incremented
          when existing values are removed, value semantics change such that
          older answers are no longer usable, or new values are added that
          divide previous value semantics ambiguously.
        rationale: >
          A major bump signals to consumers that existing answers recorded
          against the prior version may not map correctly to the new version,
          requiring manual review or re-evaluation.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-01-003
        priority: MUST
        statement: >
          VR-01-003 The minor version of a DecisionPoint MUST be incremented
          (and major held constant) when new options are added while existing
          value semantics are preserved, value names or keys are changed, or
          the decision point name is changed.
        rationale: >
          Minor increments signal backward compatibility: existing answers
          remain valid but the option space has been extended or renamed.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-01-004
        priority: MUST
        statement: >
          VR-01-004 The patch version of a DecisionPoint MUST be incremented
          (and major/minor held constant) for typo fixes in option or
          decision point names, or description changes that do not affect
          semantics.
        rationale: >
          Patch increments communicate that no change in meaning occurred,
          so consumers need not re-evaluate prior answers.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-01-005
        priority: MUST
        statement: >
          VR-01-005 A DecisionPoint whose major version is 0 (i.e., v0.x)
          MUST be treated as pre-support: its key, labels, label count,
          label ordering, descriptions, and semantics are all subject to
          change without a major-version increment.
        rationale: >
          The v0.x convention provides an explicit pre-stability phase
          for new decision points before they enter production use and
          acquire backward-compatibility obligations.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-01-006
        priority: MAY
        statement: >
          VR-01-006 DecisionPoint objects SHOULD carry a status field
          indicating lifecycle stage (e.g. active, deprecated) so that
          consumers can distinguish supported decision points from those
          that should no longer be used.
        rationale: >
          ADR-0006 identifies the need for lifecycle status tracking but
          defers it to a future decision. This requirement captures the
          intent until a dedicated ADR formalises the status vocabulary.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

  - id: VR-02
    title: Decision Point Group SemVer Rules
    description: >
      Rules governing how Semantic Version numbers are incremented for
      DecisionPointGroup objects. Implements ADR-0004 and ADR-0005.
      DecisionTable versioning is covered separately in VR-05.
    specs:
      - id: VR-02-001
        priority: MUST
        statement: >
          VR-02-001 A new DecisionPointGroup object (with a new name) MUST be
          created when the stakeholder role and/or the decision being modeled
          changes, even if the constituent decision points remain the same.
        rationale: >
          Stakeholder role and modeled decision are the core identity of a
          group. A change in either represents a fork in version history that
          cannot be expressed as a version increment.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-02-002
        priority: MUST
        statement: >
          VR-02-002 The major version of a DecisionPointGroup MUST be
          incremented when a decision point is added to or removed from the
          group, or when any constituent decision point increments its own
          major version.
        rationale: >
          Adding or removing a decision point changes the input space of the
          table; a major constituent change breaks any downstream policies
          that assumed the prior input structure.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-02-003
        priority: MUST
        statement: >
          VR-02-003 The minor version of a DecisionPointGroup MUST be
          incremented (and major held constant) when any constituent decision
          point increments its own minor version.
        rationale: >
          A constituent minor increment adds options without breaking existing
          answers; a group minor increment mirrors that compatible expansion.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-02-004
        priority: MUST
        statement: >
          VR-02-004 The patch version of a DecisionPointGroup MUST be
          incremented (and major/minor held constant) when any constituent
          decision point increments its own patch version, or when the
          group's name or description changes.
        rationale: >
          Patch-level changes carry no semantic shift; a group patch mirrors
          the same signal for the group as a whole.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

  - id: VR-03
    title: JSON Schema SchemaVer Rules
    description: >
      Rules governing how SSVC JSON schema files are versioned using
      SchemaVer (MODEL-REVISION-ADDITION). Implements ADR-0015.
    specs:
      - id: VR-03-001
        priority: MUST
        statement: >
          VR-03-001 All SSVC JSON schema files MUST use SchemaVer
          (MODEL-REVISION-ADDITION format, e.g. 1-0-0) rather than SemVer
          for their schema version identifier.
        rationale: >
          SchemaVer was designed specifically for JSON schema evolution and
          maps directly onto data-compatibility questions, unlike SemVer
          which was designed for software API compatibility.
        testable: true
        tags: [tooling]

      - id: VR-03-002
        priority: MUST
        statement: >
          VR-03-002 The MODEL component of a schema's SchemaVer MUST be
          incremented when a required field is removed, a field type or
          allowed values change in a way that invalidates previously valid
          data, or the root schema structure changes.
        rationale: >
          MODEL increments warn consumers that existing stored data will
          no longer validate against the new schema.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-03-003
        priority: MUST
        statement: >
          VR-03-003 The REVISION component of a schema's SchemaVer MUST be
          incremented when a previously optional field becomes required, an
          enum gains values that affect round-trip processing for some
          consumers, or constraints are tightened such that some existing
          data would fail validation.
        rationale: >
          REVISION increments warn that some (but not necessarily all)
          existing data may fail validation.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-03-004
        priority: MUST
        statement: >
          VR-03-004 The ADDITION component of a schema's SchemaVer MUST be
          incremented when a new optional field is added, a constraint is
          relaxed, documentation fields are updated, or an enum gains new
          allowed values that only expand what is valid.
        rationale: >
          ADDITION increments signal that all existing data continues to
          validate; consumers need no immediate migration action.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

  - id: VR-04
    title: Project CalVer Rules
    description: >
      Rules governing how the overall SSVC project and documentation
      releases are versioned using Calendar Versioning (CalVer).
      Implements ADR-0013.
    specs:
      - id: VR-04-001
        priority: MUST
        statement: >
          VR-04-001 SSVC project releases MUST use CalVer in the format
          YYYY.M.patch (e.g. 2025.6.0), where YYYY is the four-digit year,
          M is the single-digit month (no leading zero), and patch is
          incremented for subsequent updates in the same month.
        rationale: >
          CalVer embeds recency directly in the version string, which is
          more informative than SemVer for a living framework whose docs
          update frequently and independently of object-level changes.
        testable: true
        tags: [ci-cd]

      - id: VR-04-002
        priority: MUST
        statement: >
          VR-04-002 Individual SSVC domain objects (decision points, outcome
          sets, decision tables) MUST continue to use SemVer independent
          of the project-level CalVer version.
        rationale: >
          Object-level SemVer communicates compatibility semantics that
          CalVer cannot; the two schemes are complementary and operate at
          different granularities.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

  - id: VR-05
    title: Decision Table SemVer Rules
    description: >
      Rules governing how Semantic Version numbers are incremented for
      DecisionTable objects. A DecisionTable is a composite domain object
      whose version reflects changes to its constituent decision points
      (inputs and the designated outcome decision point). Implements
      ADR-0004 and ADR-0005. Outcome sets are themselves decision points
      and are versioned under VR-01.
    specs:
      - id: VR-05-001
        priority: MUST
        statement: >
          VR-05-001 A new DecisionTable object (with a new name and key) MUST
          be created when the stakeholder role and/or the decision being
          modeled changes, even if the constituent decision points remain the
          same.
        rationale: >
          Stakeholder role and modeled decision are the core identity of a
          table. A change in either represents a fork in version history that
          cannot be expressed as a version increment.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-002
        priority: MUST
        statement: >
          VR-05-002 A new DecisionTable object (with a new name and key) MUST
          be created when the designated outcome decision point is replaced
          with a conceptually different decision point.
        rationale: >
          The outcome decision point defines what question the table answers.
          Replacing it with a conceptually different output changes the purpose
          of the table in a way that cannot be expressed as a version
          increment; a version bump would misrepresent backward compatibility.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-003
        priority: MUST
        statement: >
          VR-05-003 The major version of a DecisionTable MUST be incremented
          when an input decision point is added to or removed from the table,
          or when any constituent decision point (input or outcome) increments
          its own major version.
        rationale: >
          Adding or removing an input changes the combinatoric space of the
          table; a major constituent change breaks any downstream policies
          that assumed the prior input structure. Both events require consumers
          to reassess previously recorded answers.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-004
        priority: MUST
        statement: >
          VR-05-004 The minor version of a DecisionTable MUST be incremented
          (and major held constant) when any constituent decision point (input
          or outcome) increments its own minor version.
        rationale: >
          A constituent minor increment adds options without breaking existing
          answers; a table minor increment mirrors that compatible expansion
          and signals that prior answers remain valid.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-005
        priority: MUST
        statement: >
          VR-05-005 The patch version of a DecisionTable MUST be incremented
          (and major/minor held constant) when any constituent decision point
          (input or outcome) increments its own patch version, or when the
          table's name or description changes without altering its semantics.
        rationale: >
          Patch increments carry no semantic shift; a table patch mirrors the
          same signal for the table as a whole, and name/description-only
          changes equally carry no semantic impact.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-006
        priority: MUST
        statement: >
          VR-05-006 A DecisionTable whose major version is 0 (i.e., v0.x)
          MUST be treated as pre-support: its constituent decision points,
          designated outcome, and any row-level mappings are all subject to
          change without a major-version increment.
        rationale: >
          The v0.x convention provides an explicit pre-stability phase for new
          decision tables before they enter production use and acquire
          backward-compatibility obligations.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]

      - id: VR-05-007
        priority: MAY
        statement: >
          VR-05-007 DecisionTable objects MAY carry a status field indicating
          lifecycle stage (e.g. active, deprecated) so that consumers can
          distinguish supported tables from those that should no longer be
          used.
        rationale: >
          Lifecycle status tracking for DecisionTable is a future concern; no
          current implementation provides this field. This requirement
          captures the intent as a forward-looking allowance without imposing
          an obligation.
        testable: false
        lint_suppress: [testable_without_steps]
        tags: [documentation]
